<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will You Go Out With Me? 💜</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Parisienne&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="ambient-layer" id="ambient-layer"></div>

<div id="app">

  <!-- SCREEN 1 -->
  <section id="invite-screen" class="screen active">
    <div class="lane-glow"></div>

    <div class="neon-sign">
      <h1 class="neon-text">
        <span>Will you go</span>
        <span class="neon-highlight">out</span>
        <span>with me?</span>
      </h1>
    </div>

    <div class="bowling-scene">
      <div class="pins">🎳 🎳 🎳</div>
      <div class="ball">🔮</div>
    </div>

    <p class="cute-subtext" id="cute-subtext">no pressure... 💜</p>

    <div class="button-row">
      <button id="yes-btn" class="btn btn-yes">Yes 💜</button>
      <button id="no-btn" class="btn btn-no">No</button>
    </div>

    <p id="taunt-text"></p>
  </section>

  <!-- SCREEN 2 -->
  <section id="confirm-screen" class="screen">
    <h2>Pick a date 💜</h2>

    <div class="calendar">
      <div>
        <button id="cal-prev">‹</button>
        <span id="cal-month-label"></span>
        <button id="cal-next">›</button>
      </div>

      <div id="cal-grid"></div>
    </div>

    <div class="time-pills" id="time-pills">
      <button class="pill" data-time="11:00 AM">11</button>
      <button class="pill" data-time="2:00 PM">2</button>
      <button class="pill" data-time="7:00 PM">7</button>
      <button class="pill" data-time="other">Other</button>
    </div>

    <input type="time" id="custom-time" class="hidden"/>

    <p id="selection-summary"></p>

    <button id="submit-btn" disabled>Confirm 💜</button>
    <p id="send-status"></p>
  </section>

  <!-- SCREEN 3 -->
  <section id="thankyou-screen" class="screen">
    <h2>It’s a date 💜</h2>
    <p id="thankyou-details"></p>
  </section>

</div>

<canvas id="confetti-canvas"></canvas>

<script src="script.js"></script>
</body>
</html>
